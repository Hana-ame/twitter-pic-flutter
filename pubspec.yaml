name: twitter_pic_flutter
description: "A Flutter project for Twitter image browsing."
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  ffi: ^2.2.0          # using/Arena/Utf8 在 2.x 中仍可用，无需更改代码
  path_provider: ^2.1.5
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#15202B"
  adaptive_icon_foreground: "assets/icon.png"
  min_sdk_android: 21
  windows:
    generate: true
    icon_size: 256

flutter:
  uses-material-design: true
